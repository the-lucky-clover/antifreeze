<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neon Summarizer Results</title>
    <link rel="stylesheet" href="../shared/styles.css" />
  </head>
  <body>
    <main class="shell" style="display:grid; gap:18px;">
      <section class="panel hero">
        <span class="kicker">Live Results Telemetry</span>
        <div style="height:12px"></div>
        <div class="grid two">
          <div>
            <h1>Batch summarization cockpit</h1>
            <p>Each background tab appears here with thumbnail, URL, title, progress, and the final three-part summary.</p>
          </div>
          <div class="stats">
            <div class="stat"><div class="small">Queued</div><div id="statQueued" class="value">0</div></div>
            <div class="stat"><div class="small">Running</div><div id="statRunning" class="value">0</div></div>
            <div class="stat"><div class="small">Done</div><div id="statDone" class="value">0</div></div>
          </div>
        </div>
      </section>

      <section class="panel" style="padding:18px; display:grid; gap:14px;">
        <div class="actions">
          <button id="refreshBtn">Refresh board</button>
          <button id="queueBackgroundBtn" class="secondary">Queue background tabs</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Thumbnail</th>
                <th>URL + title</th>
                <th>Status</th>
                <th>Summary</th>
                <th>Feedback</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="jobsTable"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script type="module" src="results.js"></script>
  </body>
</html>
